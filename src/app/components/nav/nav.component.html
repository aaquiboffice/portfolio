<nav class="nav" [class.scrolled]="scrolled()">
  <a routerLink="/" class="nav-logo" (click)="closeMenu()" aria-label="aaquib.dev — Home">
    <span class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
        <path d="M5 19 L12 5 L19 19 M8.2 14 L15.8 14"
              stroke="white" stroke-width="2.6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-shine" aria-hidden="true"></span>
    </span>
    <span class="logo-text">
      <span class="logo-name">Aaquib</span><span class="logo-dot">.</span><span class="logo-tld">dev</span>
    </span>
  </a>

  <ul class="nav-links" [class.open]="menuOpen()">
    @for (link of links; track link.route) {
      <li>
        <a [routerLink]="link.route"
           [class.active]="activeId() === link.id"
           class="nav-link"
           (click)="closeMenu()">
          <span>{{ link.num }}</span> {{ link.label }}
        </a>
      </li>
    }
  </ul>

  <div class="nav-actions">
    <a routerLink="/contact" class="nav-cta" [appMagnetic]="0.25" (click)="closeMenu()">
      Let's Talk <span class="arrow">→</span>
    </a>

    <button class="nav-toggle"
            [class.open]="menuOpen()"
            (click)="toggleMenu()"
            aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
