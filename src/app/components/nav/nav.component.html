<nav class="nav" [class.scrolled]="scrolled()">
  <a routerLink="/" class="nav-logo" (click)="closeMenu()" aria-label="aaquib.dev — Home">
    <span class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
        <path d="M5 19 L12 5 L19 19 M8.2 14 L15.8 14"
              stroke="white" stroke-width="2.6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-shine" aria-hidden="true"></span>
    </span>
    <span class="logo-text">
      <span class="logo-name">aaquib</span><span class="logo-dot">.</span><span class="logo-tld">dev</span>
    </span>
  </a>

  <ul class="nav-links" [class.open]="menuOpen()">
    @for (link of links; track link.route) {
      <li>
        <a [routerLink]="link.route"
           [class.active]="activeId() === link.id"
           class="nav-link"
           (click)="closeMenu()">
          <span>{{ link.num }}</span> {{ link.label }}
        </a>
      </li>
    }
  </ul>

  <div class="nav-actions">
    <button class="theme-toggle"
            type="button"
            (click)="themeService.toggle()"
            [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
            [attr.aria-pressed]="themeService.isDark()">
      @if (themeService.isDark()) {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <a routerLink="/contact" class="nav-cta" (click)="closeMenu()">
      Let's Talk <span class="arrow">→</span>
    </a>

    <button class="nav-toggle"
            [class.open]="menuOpen()"
            (click)="toggleMenu()"
            aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
