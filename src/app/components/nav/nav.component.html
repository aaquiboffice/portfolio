<nav class="nav" [class.scrolled]="scrolled()">
  <a routerLink="/" class="nav-logo" (click)="closeMenu()" aria-label="aaquib.dev — Home">
    <span class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="120" rx="25" fill="#0F172A"/>
        <path d="M40 75 L55 35 H65 L80 75 H70 L66 65 H54 L50 75 H40Z" fill="#38BDF8"/>
        <path d="M28 45 L18 60 L28 75" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M92 45 L102 60 L92 75" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-shine" aria-hidden="true"></span>
    </span>
    <span class="logo-text">
      <span class="logo-name">Aaquib</span><span class="logo-dot">.</span><span class="logo-tld">dev</span>
    </span>
  </a>

  <ul class="nav-links" [class.open]="menuOpen()">
    @for (link of links; track link.route) {
      <li>
        <a [routerLink]="link.route"
           [class.active]="activeId() === link.id"
           class="nav-link"
           (click)="closeMenu()">
          <span>{{ link.num }}</span> {{ link.label }}
        </a>
      </li>
    }
  </ul>

  <div class="nav-actions">
    <a routerLink="/contact" class="nav-cta" [appMagnetic]="0.25" (click)="closeMenu()">
      Let's Talk <span class="arrow">→</span>
    </a>

    <button class="nav-toggle"
            [class.open]="menuOpen()"
            (click)="toggleMenu()"
            aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
