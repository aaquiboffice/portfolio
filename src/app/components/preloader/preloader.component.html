@if (!removed()) {
  <div class="preloader" [class.hiding]="hiding()">
    <div class="preloader-inner">
      <div class="preloader-logo">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="120" height="120" rx="25" fill="#0F172A"/>
            <path d="M40 75 L55 35 H65 L80 75 H70 L66 65 H54 L50 75 H40Z" fill="#38BDF8"/>
            <path d="M28 45 L18 60 L28 75" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M92 45 L102 60 L92 75" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <div class="brand-text">
          <span class="brand-name"><span>Aaquib</span><span class="dot">.</span><span class="tld">dev</span></span>
          <span class="brand-sub">PORTFOLIO · 2026</span>
        </div>
      </div>

      <div class="progress-row">
        <span class="loading-label">Loading experience</span>
        <span class="progress-num">{{ progress() }}<span class="pct">%</span></span>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" [style.width.%]="progress()"></div>
      </div>
    </div>

    <div class="curtain top"></div>
    <div class="curtain bottom"></div>
  </div>
}
