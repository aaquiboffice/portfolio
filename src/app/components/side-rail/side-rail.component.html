<!-- RIGHT: section dot navigator + scroll % -->
<aside class="rail rail-right">
  <ul class="nav-dots">
    @for (s of sections; track s.id) {
      <li>
        <button type="button"
                class="nav-dot"
                [class.active]="activeId() === s.id"
                (click)="jumpTo(s.id)"
                [attr.aria-label]="'Jump to ' + s.label">
          <span class="dot-mark" aria-hidden="true"></span>
          <span class="dot-label">{{ s.label }}</span>
        </button>
      </li>
    }
  </ul>

  <div class="rail-divider"></div>

  <div class="scroll-pct">
    <span class="pct-num">{{ scrollPct() }}</span>
    <span class="pct-sym">%</span>
  </div>
</aside>
